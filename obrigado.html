<style>
  *      { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: #0A0A08; color: #fff; }

  .top-bar {
    height: 10vh;
    background: linear-gradient(135deg, #F57C00, #FFA040);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 8px 20px;
  }
  .top-bar h2 { font-size: clamp(1.1rem, 2.5vw, 1.6rem); color: #0A0A08; letter-spacing: 1px; font-weight: 800; }
  .top-bar p  { font-size: clamp(0.7rem, 1.3vw, 0.85rem); color: rgba(10, 10, 8, 0.8); margin-top: 2px; }

  typebot-standard { width: 100%; height: 90%; display: block; }

<body>

<div class="top-bar">
  <h2>Você está quase lá! Complete seu cadastro.</h2>
  <p>Falta apenas mais um passo para garantir sua vaga.</p>
</div>

<typebot-standard style="width: 100%; height: 90%;"></typebot-standard>

<script type="module">
  import Typebot from 'https://cdn.jsdelivr.net/npm/@typebot.io/js@0/dist/web.js';

  const params = new URLSearchParams(window.location.search);

  Typebot.initStandard({
    typebot: "pos-uag-aplicacao-perpetuo",
    prefilledVariables: {
      "Nome":         params.get('nome')         || '',
      "email":        params.get('email')        || '',
      "whatsapp":     params.get('whatsapp')     || '',
      "formacao":     params.get('formacao')     || '',
      "utm_source":   params.get('utm_source')   || '',
      "utm_medium":   params.get('utm_medium')   || '',
      "utm_campaign": params.get('utm_campaign') || '',
      "utm_term":     params.get('utm_term')     || '',
      "utm_content":  params.get('utm_content')  || ''
    }
  });

  // Evento GTM para o thank-you
  if (window.dataLayer) window.dataLayer.push({
    event: 'thank_you_view',
    lead_email: params.get('email'),
    utm_source: params.get('utm_source'),
    utm_campaign: params.get('utm_campaign')
  });
</script>

</body>
